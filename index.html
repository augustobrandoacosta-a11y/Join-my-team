<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Aeys Team</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 350px;
        }
        h1 { margin-bottom: 10px; font-size: 28px; color: #ff0000; }
        p { color: #aaa; margin-bottom: 25px; }
        
        .join-btn {
            background-color: #ff0000;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            display: block;
            transition: transform 0.2s, background 0.2s;
        }
        .join-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        /* Rules Overlay */
        #rules {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #rules:target { display: flex; }
        
        .rules-box {
            background: #282828;
            padding: 30px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 2px solid #ff0000;
        }
        h2 { margin-top: 0; color: #ff0000; }
        ul { text-align: left; padding-left: 10px; list-style: none; }
        li { margin-bottom: 15px; font-size: 16px; line-height: 1.4; }
        
        .finish-btn {
            background-color: #238636; /* Green for "Finish/Go" */
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: block;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .finish-btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Aeys Team</h1>
        <p>Click the button to read the rules and join the team!</p>
        
        <a href="#rules" class="join-btn">Join Aeys Team</a>
    </div>

    <div id="rules">
        <div class="rules-box">
            <h2>Team Rules</h2>
            <ul>
                <li>❌ <strong>Rule 1:</strong> No bashing.</li>
                <li>😎 <strong>Rule 2:</strong> I only do people's comments that are cool.</li>
                <li>✅ <strong>Rule 3:</strong> The comments need to be normal.</li>
            </ul>
            
            <p style="font-size: 12px; color: #888;">By clicking Finish, you agree to follow the rules!</p>
            
            <a href="https://youtube.com/@aey1.1" class="finish-btn">Finish & Join</a>
        </div>
    </div>

</body>
</html>
